<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Meal Planner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="app-title">Meal Planner</div>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-page="planner">Meal Planner</button>
      <button class="nav-tab" data-page="grocery">Grocery List</button>
    </nav>
  </header>

  <!-- Meal Planner Page -->
  <div id="page-planner">
    <div class="day-tabs" id="day-tabs">
      <div class="day-tabs-left" id="day-tabs-list"></div>
      <div class="day-tabs-right">
        <button class="icon-btn" id="calendar-btn" title="Date range">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </button>
        <button class="icon-btn clear-btn" id="clear-btn" title="Clear meals" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="main-content" id="planner-content"></div>
  </div>

  <!-- Grocery List Page -->
  <div id="page-grocery" style="display:none">
    <div class="main-content" id="grocery-content"></div>
  </div>

  <!-- Assignment Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">Assign Meal</div>
      <label for="modal-day">Day</label>
      <select id="modal-day"></select>
      <label for="modal-slot">Meal Slot</label>
      <select id="modal-slot">
        <option value="Breakfast">Breakfast</option>
        <option value="Lunch">Lunch</option>
        <option value="Snack">Snack</option>
        <option value="Dinner">Dinner</option>
        <option value="Dessert">Dessert</option>
      </select>
      <div class="modal-actions">
        <button class="btn btn-primary" id="modal-confirm">Assign</button>
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Calendar Modal -->
  <div class="modal-overlay" id="calendar-overlay">
    <div class="modal">
      <div class="modal-title">Date Range</div>
      <div class="calendar-presets">
        <button class="btn-preset" id="cal-preset-week">1 Week</button>
        <button class="btn-preset" id="cal-preset-2week">2 Weeks</button>
        <button class="btn-preset" id="cal-preset-month">30 Days</button>
      </div>
      <label for="calendar-start">Start Date</label>
      <input type="date" id="calendar-start" class="date-input">
      <label for="calendar-end">End Date</label>
      <input type="date" id="calendar-end" class="date-input">
      <div class="modal-actions">
        <button class="btn btn-primary" id="calendar-apply">Apply</button>
        <button class="btn btn-secondary" id="calendar-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Clear Modal -->
  <div class="modal-overlay" id="clear-overlay">
    <div class="modal">
      <div class="modal-title">Clear Meal Assignments</div>
      <p class="clear-desc">Select which days to clear:</p>
      <div class="clear-date-list" id="clear-date-list"></div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="clear-confirm">Clear Selected</button>
        <button class="btn btn-secondary" id="clear-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Nutrition Facts Modal -->
  <div class="modal-overlay" id="nutrition-overlay">
    <div class="modal nutrition-modal">
      <div class="nutrition-modal-header">
        <span id="nutrition-modal-meal-name"></span>
        <button class="nutrition-modal-close" id="nutrition-close-btn">&times;</button>
      </div>
      <div id="nutrition-label-container"></div>
    </div>
  </div>

  <!-- AI Chat FAB -->
  <button class="chat-fab" id="chat-fab" title="AI Assistant">&#9830;</button>

  <!-- AI Chat Panel -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-title">AI Assistant</div>
      <input type="password" class="chat-api-key" id="chat-api-key"
             placeholder="Enter Anthropic API key..." autocomplete="off">

    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chat-input"
             placeholder="Ask about meals, macros, or changes...">
      <button class="chat-send" id="chat-send">Send</button>
    </div>
  </div>

  <script src="meals.js?v=5"></script>
  <script src="nutrition.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
